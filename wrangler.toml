# Reusable SvelteKit + Cloudflare client site template configuration
name = "generalize-landing-template"
compatibility_date = "2026-06-30"
compatibility_flags = [ "nodejs_compat" ]
pages_build_output_dir = ".svelte-kit/cloudflare"

[vars]
# Public environment variables (non-sensitive)
PUBLIC_SITE_URL = "https://client-site.pages.dev"

[[d1_databases]]
binding = "DB"
database_name = "client-name-db"
database_id = "41bd61e2-e576-4bdc-92c3-b140e99959f9"
migrations_dir = "drizzle"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "client-name-media"
preview_bucket_name = "client-name-media"
